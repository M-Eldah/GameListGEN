<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bootstrap Page</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous" />

        <!-- Custom styles -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="row vh-100">
            <div
                class="d-flex flex-column align-items-stretch flex-shrink-0 col-3 h-100">
                <a
                    style="background-color: rgba(0, 0, 0, 0.25);color: aliceblue;"
                    href="/"
                    class="d-flex align-items-center flex-shrink-0 p-3 link-body-emphasis text-decoration-none border-bottom">

                    <span class="fs-5 fw-semibold "
                        style="color: aliceblue;">GameList</span>
                </a>
                <div style="overflow-y: scroll;"
                    class="MotherData">

                </div>
            </div>
            <div class="col-9 h-100 class" id="GalleryPiece">
                <div id="carouselExampleAutoplaying" class="carousel slide "
                    data-bs-ride="carousel">
                    <div class="carousel-inner" id="GalleryInner">
                        <div class="carousel-item">
                            <img
                                src="https://image.api.playstation.com/vulcan/ap/rnd/202308/1519/95cce955dc59d04e2ea5ab624a823ace14e9c5f7e24dfb8f.png"
                                class="d-block w-100 h-100" alt="...">
                        </div>
                        <div class="carousel-item active">
                            <img
                                src="https://production-static.mobilesyrup.com/uploads/2023/09/bg3_exploration.jpg"
                                class="d-block w-100 h-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img
                                src="https://tweakers.net/i/9OwbEL7zw5hdFNJtAoMx2ueW6YI=/1280x/filters:strip_icc():strip_exif()/i/2006018332.jpeg?f=imagegallery class="
                                class="d-block w-100 h-100" alt="...">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button"
                        data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"
                            aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button"
                        data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"
                            aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
                <p id="GalleryParagraph">
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Hic, sunt voluptatibus eius incidunt quasi aliquid quod quia
                    consequatur tenetur esse! Asperiores laudantium optio at
                    quod quia voluptates, mollitia rerum quae!
                </p>
            </div>
        </div>
        <!-- Bootstrap JS -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </body>
</html>
